<!DOCTYPE html>
<html lang="en">
<head>

    <title>"calculator"</title>

<body>

    <display>   
        <div class="Title">
            Multi-Function Calculator
        </div>


    </display>

<form oninput="result.value=parseInt(a.value)+parseInt(b.value)">
    
    <input type="number" id="a" name="input_number1" value="input_number1" /> 

    <form>
        <select id="operation">
        <option>plus</option>
        <option>minus</option>
        <option>multiplied by</option>
        <option>divided by</option>
        </select>
    </form>

    <input type="number" id="b" name="input_number2" value="input_number2" /> =
    
    <output name="result" for="a b">sum </output>

</form>

</body>

</html>
